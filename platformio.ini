; PlatformIO build config for the ESP32 e-paper web display.
; The Arduino sketch (esp32-epaper-web.ino) lives in the repo root, so we
; point src_dir at "." instead of the default src/ folder. PlatformIO
; auto-converts the .ino to .cpp at build time.

[platformio]
src_dir = .
; NOTE: PlatformIO concatenates every *.ino in src_dir into one sketch, so a
; second .ino here causes redefinition errors. The old static bring-up
; prototype was renamed to epaper-sketch_jun24a.ino.bak to keep it out of the
; build (build_src_filter does NOT exclude .ino files — only .c/.cpp).

[env:esp32dev]
platform = espressif32
board = esp32doit-devkit-v1     ; NodeMCU ESP32 DevKit V1 (30-pin, DOIT)
framework = arduino
monitor_speed = 115200
upload_port = COM7              ; serial port — adjust to your machine (was COM3)
monitor_port = COM7
board_build.partitions = min_spiffs.csv  ; two ~1.9MB OTA app slots (OTA needs 2 app partitions)

lib_deps =
    zinggjm/GxEPD2
    adafruit/Adafruit GFX Library
    esp32async/ESPAsyncWebServer
    esp32async/AsyncTCP
    bblanchon/ArduinoJson

; Over-the-air upload (flash over Wi-Fi):  pio run -e esp32dev_ota -t upload
; Requires ArduinoOTA running on the device (it is, after first serial flash).
;
; !! .50 IS NO LONGER THIS ESP32 UNIT !! (see JOURNAL.md, 2026-07-15-ish) —
; the deployed device at .50 is now the ESP8266/ESP-12E board (env esp12e).
; Pushing THIS env's ESP32-architecture binary at .50 over OTA would hit the
; ESP8266 board and very likely brick it (incompatible flash layout/bootloader
; — OTA has no architecture check). Only re-point upload_port at .50 if the
; ESP32 unit is genuinely redeployed there again; until then this is a
; placeholder that forces a deliberate choice instead of silently targeting
; the wrong board.
[env:esp32dev_ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = CHANGE_ME_ESP32_DEVICE_IP
; upload_flags = --auth=YOUR_OTA_PASSWORD   ; uncomment if you set OTA_PASSWORD

; ---------------------------------------------------------------------------
; ESP-12E (ESP8266) port. See README "ESP8266 (ESP-12E) port" section for the
; pin map, battery-sense calibration, and AP-mode Wi-Fi recovery.
; STATUS (2026-07-15-ish): this board IS the deployed device now, at static
; .50 — the original ESP32 unit was retired. secrets.h's USE_STATIC_IP block
; used to be guarded to ESP32-only specifically so this board could never
; collide with the ESP32 unit at .50; that guard was removed once the ESP32
; unit came down and this board took over the address on purpose. If the old
; ESP32 board is ever brought back online with this same secrets.h, IT will
; also try to claim .50 and collide — give it a different address first.
[env:esp12e]
platform = espressif8266
board = nodemcuv2               ; ESP-12E module on a NodeMCU-style dev board
framework = arduino
monitor_speed = 115200
upload_port = COM3
monitor_port = COM3
board_build.filesystem = littlefs

lib_deps =
    zinggjm/GxEPD2
    adafruit/Adafruit GFX Library
    esp32async/ESPAsyncWebServer
    esp32async/ESPAsyncTCP        ; ESP8266's AsyncTCP equivalent (ESP32 uses AsyncTCP)
    bblanchon/ArduinoJson

; Over-the-air upload for the ESP8266 board (after the first USB flash):
;   pio run -e esp12e_ota -t upload
[env:esp12e_ota]
extends = env:esp12e
upload_protocol = espota
upload_port = 192.168.12.50     ; the deployed device's static IP (device IP or epaper8266.local)
; upload_flags = --auth=YOUR_OTA_PASSWORD
