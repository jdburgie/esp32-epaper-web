; PlatformIO build config for the ESP32 e-paper web display.
; The Arduino sketch (esp32-epaper-web.ino) lives in the repo root, so we
; point src_dir at "." instead of the default src/ folder. PlatformIO
; auto-converts the .ino to .cpp at build time.

[platformio]
src_dir = .
; NOTE: PlatformIO concatenates every *.ino in src_dir into one sketch, so a
; second .ino here causes redefinition errors. The old static bring-up
; prototype was renamed to epaper-sketch_jun24a.ino.bak to keep it out of the
; build (build_src_filter does NOT exclude .ino files — only .c/.cpp).

[env:esp32dev]
platform = espressif32
board = esp32doit-devkit-v1     ; NodeMCU ESP32 DevKit V1 (30-pin, DOIT)
framework = arduino
monitor_speed = 115200
upload_port = COM7              ; serial port — adjust to your machine (was COM3)
monitor_port = COM7
board_build.partitions = min_spiffs.csv  ; two ~1.9MB OTA app slots (OTA needs 2 app partitions)

lib_deps =
    zinggjm/GxEPD2
    adafruit/Adafruit GFX Library
    esp32async/ESPAsyncWebServer
    esp32async/AsyncTCP
    bblanchon/ArduinoJson

; Over-the-air upload (flash over Wi-Fi):  pio run -e esp32dev_ota -t upload
; Requires ArduinoOTA running on the device (it is, after first serial flash).
[env:esp32dev_ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = 192.168.12.50     ; device IP (or epaper.local)
; upload_flags = --auth=YOUR_OTA_PASSWORD   ; uncomment if you set OTA_PASSWORD

; ---------------------------------------------------------------------------
; ESP-12E (ESP8266) port — a separate experimental board, NOT the deployed
; ESP32 unit. See README "ESP8266 (ESP-12E) port" section for the pin map,
; battery-sense calibration, and AP-mode Wi-Fi recovery.
; NOTE: secrets.h's USE_STATIC_IP block is guarded to ESP32 only in the sketch
; (#if defined(ESP32) && defined(USE_STATIC_IP)) specifically so this board
; can never accidentally claim the deployed unit's static .50 — it always
; gets a normal DHCP address, no manual secrets.h edits needed either way.
[env:esp12e]
platform = espressif8266
board = nodemcuv2               ; ESP-12E module on a NodeMCU-style dev board
framework = arduino
monitor_speed = 115200
upload_port = COM3
monitor_port = COM3
board_build.filesystem = littlefs

lib_deps =
    zinggjm/GxEPD2
    adafruit/Adafruit GFX Library
    esp32async/ESPAsyncWebServer
    esp32async/ESPAsyncTCP        ; ESP8266's AsyncTCP equivalent (ESP32 uses AsyncTCP)
    bblanchon/ArduinoJson

; Over-the-air upload for the ESP8266 board (after the first USB flash):
;   pio run -e esp12e_ota -t upload
[env:esp12e_ota]
extends = env:esp12e
upload_protocol = espota
upload_port = 192.168.12.206    ; DHCP-assigned — adjust if it changes (check serial or your router)
; upload_flags = --auth=YOUR_OTA_PASSWORD
