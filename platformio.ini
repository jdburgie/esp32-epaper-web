; PlatformIO build config for the ESP32 e-paper web display.
; The Arduino sketch (esp32-epaper-web.ino) lives in the repo root, so we
; point src_dir at "." instead of the default src/ folder. PlatformIO
; auto-converts the .ino to .cpp at build time.

[platformio]
src_dir = .
; NOTE: PlatformIO concatenates every *.ino in src_dir into one sketch, so a
; second .ino here causes redefinition errors. The old static bring-up
; prototype was renamed to epaper-sketch_jun24a.ino.bak to keep it out of the
; build (build_src_filter does NOT exclude .ino files — only .c/.cpp).

[env:esp32dev]
platform = espressif32
board = esp32doit-devkit-v1     ; NodeMCU ESP32 DevKit V1 (30-pin, DOIT)
framework = arduino
monitor_speed = 115200
upload_port = COM7              ; serial port — adjust to your machine (was COM3)
monitor_port = COM7
board_build.partitions = min_spiffs.csv  ; two ~1.9MB OTA app slots (OTA needs 2 app partitions)

lib_deps =
    zinggjm/GxEPD2
    adafruit/Adafruit GFX Library
    esp32async/ESPAsyncWebServer
    esp32async/AsyncTCP
    bblanchon/ArduinoJson

; Over-the-air upload (flash over Wi-Fi):  pio run -e esp32dev_ota -t upload
; Requires ArduinoOTA running on the device (it is, after first serial flash).
[env:esp32dev_ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = 192.168.12.50     ; device IP (or epaper.local)
; upload_flags = --auth=YOUR_OTA_PASSWORD   ; uncomment if you set OTA_PASSWORD
